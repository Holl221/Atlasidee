<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АРХИВ — Атлас исчезающих ремесел</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="page-header">
        <a href="index.html" class="back-link">← НА ГЛАВНУЮ</a>
        <h1>АРХИВ</h1>
        <p class="subtitle">Звуки и текстуры уходящих ремесел</p>
    </header>

    <section class="archive-section">
        <h2 class="archive-title">ЗВУКИ</h2>

        <div class="audio-player">
            <h3>ЗВУК ПЕЧАТНОЙ МАШИНКИ</h3>
            <button class="audio-play-btn" data-audio="audio1">▶ ВОСПРОИЗВЕСТИ</button>
            <div class="audio-visualizer">
                <div class="visualizer-bar"></div>
                <div class="visualizer-bar"></div>
                <div class="visualizer-bar"></div>
                <div class="visualizer-bar"></div>
                <div class="visualizer-bar"></div>
                <div class="visualizer-bar"></div>
                <div class="visualizer-bar"></div>
                <div class="visualizer-bar"></div>
                <div class="visualizer-bar"></div>
                <div class="visualizer-bar"></div>
            </div>
            <audio id="audio1" controls style="width: 100%; margin-top: 20px;">
                <source src="aim/sound1.mp3" type="audio/mpeg">
            </audio>
        </div>

        <div class="audio-player">
            <h3>СКРИП МЕХОВ ГАРМОНИ</h3>
            <button class="audio-play-btn" data-audio="audio2">▶ ВОСПРОИЗВЕСТИ</button>
            <div class="audio-visualizer">
                <div class="visualizer-bar"></div>
                <div class="visualizer-bar"></div>
                <div class="visualizer-bar"></div>
                <div class="visualizer-bar"></div>
                <div class="visualizer-bar"></div>
                <div class="visualizer-bar"></div>
                <div class="visualizer-bar"></div>
                <div class="visualizer-bar"></div>
                <div class="visualizer-bar"></div>
                <div class="visualizer-bar"></div>
            </div>
            <audio id="audio2" controls style="width: 100%; margin-top: 20px;">
                <source src="aim/sound2.mp3" type="audio/mpeg">
            </audio>
        </div>

        <div class="audio-player">
            <h3>ТИКАНЬЕ МЕХАНИЧЕСКИХ ЧАСОВ</h3>
            <button class="audio-play-btn" data-audio="audio3">▶ ВОСПРОИЗВЕСТИ</button>
            <div class="audio-visualizer">
                <div class="visualizer-bar"></div>
                <div class="visualizer-bar"></div>
                <div class="visualizer-bar"></div>
                <div class="visualizer-bar"></div>
                <div class="visualizer-bar"></div>
                <div class="visualizer-bar"></div>
                <div class="visualizer-bar"></div>
                <div class="visualizer-bar"></div>
                <div class="visualizer-bar"></div>
                <div class="visualizer-bar"></div>
            </div>
            <audio id="audio3" controls style="width: 100%; margin-top: 20px;">
                <source src="aim/sound3.mp3" type="audio/mpeg">
            </audio>
        </div>
    </section>

    <section class="archive-section">
        <h2 class="archive-title">ТЕКСТУРЫ</h2>

        <div class="texture-grid">
            <div class="texture-item" style="background-image: url('aim/image16.jpg');" title="Бумага ручной выделки"></div>
            <div class="texture-item" style="background-image: url('aim/image17.jpg');" title="Старая кожа"></div>
            <div class="texture-item" style="background-image: url('aim/image18.jpg');" title="Металл"></div>
            <div class="texture-item" style="background-image: url('aim/image19.jpg');" title="Дерево"></div>
            <div class="texture-item" style="background-image: url('aim/image20.jpg');" title="Ткань"></div>
            <div class="texture-item" style="background-image: url('aim/image21.jpg');" title="Воск"></div>
            <div class="texture-item" style="background-image: url('aim/image22.jpg');" title="Медь"></div>
            <div class="texture-item" style="background-image: url('aim/image23.jpg');" title="Камень"></div>
            <div class="texture-item" style="background-image: url('aim/image24.jpg');" title="Стекло"></div>
        </div>
    </section>

    <footer class="footer-brutal">
        <div class="footer-brutal__left">ПРОЕКТ СОЗДАН<br>В 2026 ГОДУ</div>
        <div class="footer-brutal__right">ВСЕ РЕМЕСЛА,<br>ПРЕДСТАВЛЕННЫЕ В АТЛАСЕ,<br>ЯВЛЯЮТСЯ ЧАСТЬЮ<br>МИРОВОГО НАСЛЕДИЯ</div>
        <div class="footer-brutal__credit">САЙТ РАЗРАБОТАЛ <a href="#">Holl</a></div>
    </footer>

</body>
</html>
